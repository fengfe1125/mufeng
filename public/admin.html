<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mufeng admin</title>
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <main class="app">
      <div class="lang-toggle">
        <button id="lang-btn" type="button">中文</button>
      </div>
      <section class="card">
        <h1 data-i18n="admin_title">mufeng admin</h1>
        <p data-i18n="admin_desc">Approve or revoke devices. Admin key required.</p>
        <div class="row">
          <input id="admin-key" type="password" data-i18n-placeholder="admin_key" placeholder="Admin key" />
          <button id="save-key" data-i18n="save_btn">Save</button>
        </div>
        <div class="row">
          <button id="approve-codex-btn" data-i18n="approve_codex_btn">Approve Codex Devices</button>
        </div>
        <div class="status" id="status"></div>
      </section>

      <section class="card">
        <h2 data-i18n="pending_title">Pending devices</h2>
        <ul id="pending-list"></ul>
      </section>

      <section class="card">
        <h2 data-i18n="trusted_title">Trusted devices</h2>
        <ul id="trusted-list"></ul>
      </section>
    </main>
    <script src="/static/admin.js"></script>
  </body>
</html>
